services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=karaogui'
      - 'POSTGRES_USER=karaogui'
      - 'POSTGRES_PASSWORD=karaogui'
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U karaogui -d karaogui']
      interval: 5s
      timeout: 5s
      retries: 5
