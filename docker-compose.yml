services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: karaogui
      POSTGRES_USER: karaogui
      POSTGRES_PASSWORD: karaogui
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U karaogui -d karaogui']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/karaogui
      SPRING_DATASOURCE_USERNAME: karaogui
      SPRING_DATASOURCE_PASSWORD: karaogui
    ports:
      - '0.0.0.0:8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/actuator/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
